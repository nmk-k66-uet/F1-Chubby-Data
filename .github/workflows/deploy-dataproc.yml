name: Deploy Dataproc Jobs

on:
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Which Spark job to submit'
        required: true
        type: choice
        options:
          - etl
          - training
          - streaming-fast
          - streaming-slow
          - all

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: gen-lang-client-0314607994
  REGION: asia-southeast1
  CLUSTER_NAME: f1-chubby-spark
  STAGING_BUCKET: f1chubby-dataproc-staging-gen-lang-client-0314607994

jobs:
  submit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload Spark jobs to GCS
        run: |
          gsutil cp spark/*.py gs://${{ env.STAGING_BUCKET }}/spark/

      - name: Create Dataproc cluster (if not exists)
        run: |
          if gcloud dataproc clusters describe ${{ env.CLUSTER_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} &>/dev/null; then
            echo "Cluster ${{ env.CLUSTER_NAME }} already exists — skipping creation."
          else
            echo "Creating cluster ${{ env.CLUSTER_NAME }} …"
            gcloud dataproc clusters create ${{ env.CLUSTER_NAME }} \
              --region ${{ env.REGION }} \
              --single-node \
              --master-machine-type n1-standard-4 \
              --master-boot-disk-size 50GB \
              --image-version 2.1-debian11 \
              --max-idle 600s \
              --project ${{ env.PROJECT_ID }} \
              --bucket ${{ env.STAGING_BUCKET }} \
              --subnet projects/${{ env.PROJECT_ID }}/regions/${{ env.REGION }}/subnetworks/f1-chubby-vpc-subnet \
              --service-account f1-dataproc-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
              --metadata 'PIP_PACKAGES=influxdb-client requests' \
              --initialization-actions gs://goog-dataproc-initialization-actions-${{ env.REGION }}/python/pip-install.sh
          fi

      - name: Submit ETL Job
        if: inputs.job_type == 'etl' || inputs.job_type == 'all'
        run: |
          gcloud dataproc jobs submit pyspark \
            gs://${{ env.STAGING_BUCKET }}/spark/etl_pipeline.py \
            --cluster ${{ env.CLUSTER_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --jars gs://spark-lib/postgres/postgresql-42.7.3.jar

      - name: Submit Model Training Job
        if: inputs.job_type == 'training' || inputs.job_type == 'all'
        run: |
          gcloud dataproc jobs submit pyspark \
            gs://${{ env.STAGING_BUCKET }}/spark/training_pipeline.py \
            --cluster ${{ env.CLUSTER_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }}

      - name: Submit Streaming Fast Path
        if: inputs.job_type == 'streaming-fast' || inputs.job_type == 'all'
        run: |
          gcloud dataproc jobs submit pyspark \
            gs://${{ env.STAGING_BUCKET }}/spark/streaming_fast.py \
            --cluster ${{ env.CLUSTER_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --properties spark.jars.packages=com.google.cloud:pubsub-spark-connector:1.0.0 \
            --async \
            -- \
            --project ${{ env.PROJECT_ID }} \
            --influxdb-url http://${{ secrets.VM_INTERNAL_IP }}:8086 \
            --influxdb-token ${{ secrets.INFLUXDB_TOKEN }} \
            --race-id "${{ secrets.RACE_ID }}"

      - name: Submit Streaming Slow Path
        if: inputs.job_type == 'streaming-slow' || inputs.job_type == 'all'
        run: |
          gcloud dataproc jobs submit pyspark \
            gs://${{ env.STAGING_BUCKET }}/spark/streaming_slow.py \
            --cluster ${{ env.CLUSTER_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --properties spark.jars.packages=com.google.cloud:pubsub-spark-connector:1.0.0 \
            --async \
            -- \
            --project ${{ env.PROJECT_ID }} \
            --influxdb-url http://${{ secrets.VM_INTERNAL_IP }}:8086 \
            --influxdb-token ${{ secrets.INFLUXDB_TOKEN }} \
            --model-api-url http://${{ secrets.VM_INTERNAL_IP }}:8080 \
            --race-id "${{ secrets.RACE_ID }}" \
            --total-laps ${{ secrets.TOTAL_LAPS }}
