name: Deploy Dataproc Jobs

on:
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Which Spark job to submit'
        required: true
        type: choice
        options:
          - training

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  CLUSTER_NAME: f1-chubby-spark
  STAGING_BUCKET: f1chubby-dataproc-staging-${{ vars.GCP_PROJECT_ID }}

jobs:
  submit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload Spark jobs and dependencies to GCS
        run: |
          gsutil cp spark/*.py gs://${{ env.STAGING_BUCKET }}/spark/
          zip -r core_dependencies.zip core/
          gsutil cp core_dependencies.zip gs://${{ env.STAGING_BUCKET }}/spark/

      - name: Ensure Dataproc cluster is RUNNING
        run: |
          CLUSTER_STATE=$(gcloud dataproc clusters describe ${{ env.CLUSTER_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format='value(status.state)' 2>/dev/null || echo "NOT_FOUND")

          echo "Cluster state: $CLUSTER_STATE"

          if [ "$CLUSTER_STATE" = "RUNNING" ]; then
            echo "Cluster ${{ env.CLUSTER_NAME }} is RUNNING — skipping creation."
          else
            if [ "$CLUSTER_STATE" != "NOT_FOUND" ]; then
              echo "Cluster is in state $CLUSTER_STATE — deleting first…"
              gcloud dataproc clusters delete ${{ env.CLUSTER_NAME }} \
                --region ${{ env.REGION }} \
                --project ${{ env.PROJECT_ID }} \
                --quiet
            fi
            echo "Creating cluster ${{ env.CLUSTER_NAME }} …"
            gcloud dataproc clusters create ${{ env.CLUSTER_NAME }} \
              --region ${{ env.REGION }} \
              --num-masters 1 \
              --master-machine-type e2-standard-4 \
              --master-boot-disk-size 50GB \
              --num-workers 2 \
              --worker-machine-type e2-standard-4 \
              --worker-boot-disk-size 50GB \
              --image-version 2.1-debian11 \
              --initialization-actions gs://goog-dataproc-initialization-actions-${{ env.REGION }}/python/pip-install.sh \
              --metadata 'PIP_PACKAGES=fastf1 numpy<2 influxdb-client requests' \
              --max-idle 600s \
              --project ${{ env.PROJECT_ID }} \
              --bucket ${{ env.STAGING_BUCKET }} \
              --subnet projects/${{ env.PROJECT_ID }}/regions/${{ env.REGION }}/subnetworks/f1-chubby-vpc-subnet \
              --service-account f1-dataproc-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          fi

      - name: Submit Model Training Job
        if: inputs.job_type == 'training'
        run: |
          gcloud dataproc jobs submit pyspark \
            gs://${{ env.STAGING_BUCKET }}/spark/training_pipeline.py \
            --cluster ${{ env.CLUSTER_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --py-files gs://${{ env.STAGING_BUCKET }}/spark/core_dependencies.zip \
            -- "${{ env.PROJECT_ID }}" 


