name: Deploy to VM

on:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'requirements-streamlit.txt'
      - 'core/**'
      - 'components/**'
      - 'pages/**'
      - 'assets/**'
      - '.streamlit/**'
      - 'model_serving/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: gen-lang-client-0314607994
  ZONE: asia-southeast1-b
  VM_NAME: f1-chubby-vm

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Copy app files to VM
        run: |
          gcloud compute scp --recurse \
            main.py Dockerfile docker-compose.yml requirements-streamlit.txt \
            .streamlit core components pages model_serving \
            ${{ env.VM_NAME }}:~/app/ \
            --zone ${{ env.ZONE }} \
            --quiet

      - name: Deploy on VM
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone ${{ env.ZONE }} \
            --quiet \
            --command "cd ~/app && docker compose up -d --build --remove-orphans"
