name: Deploy to VM

on:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'requirements-streamlit.txt'
      - 'core/**'
      - 'components/**'
      - 'pages/**'
      - 'assets/**'
      - '.streamlit/**'
      - 'model_serving/**'
      - 'streaming/**'
      - 'scripts/**'
      - 'schemas/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  ZONE: asia-southeast1-b
  VM_NAME: f1-chubby-vm

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify gcloud auth
        run: |
          gcloud auth list
          gcloud config list account
          gcloud projects describe "${{ env.PROJECT_ID }}" >/dev/null

      - name: Copy app files to VM
        run: |
          # Copy core app files
          gcloud compute scp --recurse \
            main.py Dockerfile docker-compose.yml requirements-streamlit.txt streaming scripts \
            .streamlit core components pages assets model_serving \
            ${{ env.VM_NAME }}:~/app/ \
            --zone ${{ env.ZONE }} \
            --quiet
          # Copy schemas if they exist
          [ -d "schemas" ] && gcloud compute scp --recurse schemas ${{ env.VM_NAME }}:~/app/ --zone ${{ env.ZONE }} --quiet || true

      - name: Deploy on VM
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone ${{ env.ZONE }} \
            --quiet \
            --command "cp /opt/f1chubby/.env ~/app/.env && cd ~/app && sudo docker compose up -d --build --remove-orphans"
