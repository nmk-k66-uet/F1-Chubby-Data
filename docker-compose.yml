version: "3.8"

services:
  influxdb:
    image: influxdb:2.7
    container_name: f1-influxdb
    expose:
      - "8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-f1chubby2026}
      DOCKER_INFLUXDB_INIT_ORG: f1chubby
      DOCKER_INFLUXDB_INIT_BUCKET: live_race
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-f1chubby-influx-token}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    restart: unless-stopped

  model-api:
    build: ./model_serving
    container_name: f1-model-api
    # No host port — internal only (accessed as model-api:8080 on docker network)
    expose:
      - "8080"
    environment:
      MODEL_DIR: /app/models
      GCS_BUCKET: ${GCS_MODELS_BUCKET:-}
      USE_GCS: ${USE_GCS:-true}
    volumes:
      - model-cache:/app/models
    depends_on:
      - influxdb
    restart: unless-stopped

  streamlit:
    build: .
    container_name: f1-streamlit
    ports:
      - "80:8501"
    environment:
      MODEL_API_URL: http://model-api:8080
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-f1chubby-influx-token}
      INFLUXDB_ORG: f1chubby
      INFLUXDB_BUCKET: live_race
      GCS_CACHE_BUCKET: ${GCS_CACHE_BUCKET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      F1_API_PROXY: ${F1_API_PROXY:-}
    volumes:
      - f1-cache:/app/f1_cache
    depends_on:
      - model-api
      - influxdb
    restart: unless-stopped

  streaming-fast:
    build: ./streaming
    container_name: f1-streaming-fast
    command:
      - python
      - streaming_fast.py
      - --project=${GCP_PROJECT_ID:-<PROJECT_ID>}
      - --influxdb-url=http://influxdb:8086
      - --influxdb-token=${INFLUXDB_TOKEN:-f1chubby-influx-token}
      - --timing-sub=${TIMING_VIZ_SUB:-f1-timing-viz-fast}
      - --rc-sub=${RC_VIZ_SUB:-f1-race-control-viz-fast}
      - --duration=0
    depends_on:
      - influxdb
    restart: unless-stopped

  streaming-slow:
    build: ./streaming
    container_name: f1-streaming-slow
    command:
      - python
      - streaming_slow.py
      - --project=${GCP_PROJECT_ID:-<PROJECT_ID>}
      - --influxdb-url=http://influxdb:8086
      - --influxdb-token=${INFLUXDB_TOKEN:-f1chubby-influx-token}
      - --model-api-url=http://model-api:8080
      - --timing-sub=${TIMING_PRED_SUB:-f1-timing-pred-slow}
      - --duration=0
    depends_on:
      - influxdb
      - model-api
    restart: unless-stopped

  simulation:
    build:
      context: .
      dockerfile: scripts/Dockerfile
    container_name: f1-simulation
    profiles: ["simulation"]
    environment:
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-f1chubby-influx-token}
      INFLUXDB_ORG: f1chubby
      INFLUXDB_BUCKET: live_race
      MODEL_API_URL: http://model-api:8080
    volumes:
      - f1-cache:/app/f1_cache
    depends_on:
      - influxdb
      - model-api

volumes:
  influxdb-data:
  model-cache:
  f1-cache:
